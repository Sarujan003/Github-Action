name: Send mail
on: push

jobs:
  mail:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Print Hello World
        run: echo "Hello World"

      - name: Sending a mail
        if: ${{ always() }}
        uses: dawidd6/action-send-mail@v3
        with:
          # Settings for Gmail
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{secrets.ACCOUNT}}
          password: ${{secrets.MAIL_PASSWORD}}
          
          # Email Content
          subject: Sending a mail using github action
          to: tsarujan2001@gmail.com
          from: GitHub Actions <${{secrets.MAIL_ADDRESS}}>
          body: The job is done!
          
          # Attachment
          attachments: README.md